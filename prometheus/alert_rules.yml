groups:
  - name: trade_signal_api_alerts
    rules:

      - alert: HighAPILatency
        expr: histogram_quantile(0.99, rate(trade_signal_request_duration_seconds_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "p99 latency is above 200ms for 5 minutes — investigate Redis cache performance"

      - alert: CriticalAPILatency
        expr: histogram_quantile(0.99, rate(trade_signal_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical API latency — page on-call"
          description: "p99 latency is above 500ms for 2 minutes — immediate investigation required"

      - alert: HighErrorRate
        expr: rate(trade_signal_requests_total{status="error"}[5m]) / rate(trade_signal_requests_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate above 1% for 5 minutes — check application logs"

      - alert: CriticalErrorRate
        expr: rate(trade_signal_requests_total{status="error"}[5m]) / rate(trade_signal_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical error rate — page on-call"
          description: "Error rate above 5% for 2 minutes — immediate investigation required"

      - alert: LowCacheHitRate
        expr: rate(trade_signal_cache_hits_total[5m]) / (rate(trade_signal_cache_hits_total[5m]) + rate(trade_signal_cache_misses_total[5m])) < 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below threshold"
          description: "Cache hit rate below 85% for 10 minutes — signals may be expiring too quickly"

      - alert: SLOBurnRateFast
        expr: rate(trade_signal_requests_total{status="error"}[1h]) / rate(trade_signal_requests_total[1h]) > 0.014
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SLO error budget burning too fast"
          description: "Error budget consuming at 14x normal rate — incident response required"
